services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: complif 
      POSTGRES_PASSWORD: complif 
      POSTGRES_DB: onboarding_db
    ports:
      - '5400:5432'
  localstack:
      image: localstack/localstack
      ports:
        - "4566:4566"            # Puerto gateway para todos los servicios AWS
      environment:
        - SERVICES=s3            # Solo queremos activar S3 por ahora
        - DEBUG=1
        - DATA_DIR=/tmp/localstack/data
      volumes:
        - "/var/run/docker.sock:/var/run/docker.sock"